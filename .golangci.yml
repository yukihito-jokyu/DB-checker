version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  modules-download-mode: readonly

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - gosec
    - misspell
    - noctx
    - nlreturn
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - whitespace
  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true
  exclusions:
    generated: strict
    presets:
      - comments
      - common-false-positives
      - std-error-handling

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
