services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: db_checker_integration
      MYSQL_USER: db_checker
      MYSQL_PASSWORD: db_checker
      MYSQL_ROOT_PASSWORD: db_checker_root
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "db_checker", "-pdb_checker"]
      interval: 2s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: db_checker_integration
      POSTGRES_USER: db_checker
      POSTGRES_PASSWORD: db_checker
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_checker -d db_checker_integration"]
      interval: 2s
      timeout: 5s
      retries: 30
