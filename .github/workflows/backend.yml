name: Backend CI

on:
  pull_request:
    paths:
      - "*.go"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - "wails.json"
      - ".golangci.yml"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  backend:
    name: gofmt, golangci-lint and go test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check gofmt
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Run Go tests
        run: go test ./...
