version: "3"

tasks:
  install:
    desc: frontend の依存関係をインストールする
    dir: frontend
    cmds:
      - npm install

  generate:
    desc: Wails の frontend binding を生成する
    cmds:
      - wails generate module

  test:
    desc: Go のテストを実行する
    cmds:
      - GOCACHE={{.TASKFILE_DIR}}/.cache/go-build go test ./...

  test:coverage:
    desc: Go の単体テストカバレッジ HTML を生成する
    cmds:
      - mkdir -p coverage
      - GOCACHE={{.TASKFILE_DIR}}/.cache/go-build go test ./... -coverprofile=coverage/coverage.out
      - GOCACHE={{.TASKFILE_DIR}}/.cache/go-build go tool cover -html=coverage/coverage.out -o coverage/coverage.html

  format:
    desc: Go ファイルを gofmt で整形する
    cmds:
      - gofmt -w .

  format:check:
    desc: Go ファイルが gofmt 済みか確認する
    cmds:
      - |
        files="$(gofmt -l .)"
        if [ -n "$files" ]; then
          echo "$files"
          exit 1
        fi

  lint:
    desc: Go の lint を golangci-lint で実行する
    cmds:
      - GOCACHE={{.TASKFILE_DIR}}/.cache/go-build GOLANGCI_LINT_CACHE={{.TASKFILE_DIR}}/.cache/golangci-lint golangci-lint run

  backend:check:
    desc: Go backend の format / lint / test を実行する
    cmds:
      - task: format:check
      - task: lint
      - task: test

  integration:up:
    desc: 結合テスト用 DB を起動する
    cmds:
      - docker compose -f docker-compose.integration.yml up -d --wait

  integration:test:
    desc: 実 DB を使う Go 結合テストを実行する
    env:
      DB_CHECKER_INTEGRATION_MYSQL_DSN: db_checker:db_checker@tcp(127.0.0.1:13306)/db_checker_integration?parseTime=true
      DB_CHECKER_INTEGRATION_POSTGRES_DSN: postgres://db_checker:db_checker@127.0.0.1:15432/db_checker_integration?sslmode=disable
    cmds:
      - GOCACHE={{.TASKFILE_DIR}}/.cache/go-build go test -tags=integration ./...

  integration:down:
    desc: 結合テスト用 DB を停止する
    cmds:
      - docker compose -f docker-compose.integration.yml down

  frontend:build:
    desc: frontend をビルドする
    dir: frontend
    cmds:
      - npm run build

  frontend:check:
    desc: frontend の Biome check を実行する
    dir: frontend
    cmds:
      - npm run check

  frontend:lint:
    desc: frontend の lint を実行する
    dir: frontend
    cmds:
      - npm run lint

  frontend:format:
    desc: frontend の format を実行する
    dir: frontend
    cmds:
      - npm run format

  dev:
    desc: Wails 開発サーバーを起動する
    cmds:
      - wails dev
